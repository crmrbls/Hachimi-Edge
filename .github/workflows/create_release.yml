name: Create Release

on: workflow_dispatch

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v5
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Grant execute permission to build script
        run: chmod +x tools/android/build.sh
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Hachimi for Android
        run: |
          rustup target add armv7-linux-androideabi aarch64-linux-android
          RELEASE=1 ./tools/android/build.sh

      - name: Upload Android binaries
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/*.so
            build/sha256.json
          
  build-windows:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v5
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Hachimi for Windows
        run: |
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          move build\x86_64-pc-windows-msvc\release\hachimi.dll build

      - name: Build Cellar
        run: |
          git clone --depth 1 --revision d4c3f79801c8131e26df585766c35e5ce11ec57f https://github.com/Hachimi-Hachimi/Cellar
          cd Cellar
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          move build\x86_64-pc-windows-msvc\release\cellar.dll build
          cd ..

      - name: Check out FunnyHoney
        run: git clone --depth 1 --revision 418b5348bd9b7376cc7485c591ca69d49aa4d805 https://codeberg.org/LeadRDRK/FunnyHoney.git

      - name: Build Installer
        run: |
          git clone --depth 1 --revision 552d4afe6b77925519f7b0ee81cc3ee93ce68b13 https://github.com/teiosteppa/Installer
          copy build\hachimi.dll Installer
          move Cellar\build\cellar.dll Installer
          move FunnyHoney\FunnyHoney.exe Installer
          cd Installer
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release --features compress_bin
          cd ..
          move Installer\build\x86_64-pc-windows-msvc\release\hachimi_installer.exe build

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/hachimi.dll
            build/hachimi_installer.exe

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Get release version
        id: get_info
        run: |
          VERSION=$(curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/main/Cargo.toml" | \
            awk '/^\[package\]/{flag=1} flag && /^version/{print $3; exit}' | \
            tr -d '"')
          echo "RELEASE_VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Set up git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

      - name: Create release notes
        run: |
          LATEST_TAG="${{ env.RELEASE_VERSION }}"
          echo "Creating changelog for tag: $LATEST_TAG"
          
          # Ensure tag exists, pointing to HEAD
          if ! git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            echo "Tag does not exist, creating: $LATEST_TAG"
            git tag -a "$LATEST_TAG" -m "Release $LATEST_TAG" HEAD
          fi

          # Find previous tag or use first commit
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "$LATEST_TAG^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Previous tag/commit: $PREVIOUS_TAG"

          echo "## What's Changed" > CHANGELOG.md
          COMMIT_HASHES=$(git rev-list --no-merges ${PREVIOUS_TAG}..${LATEST_TAG})

          if [ -z "$COMMIT_HASHES" ]; then
            echo "* No commits found between tags" >> CHANGELOG.md
          else
            while IFS= read -r hash; do
              [ -z "$hash" ] && continue
              subject=$(git show -s --format=%s "$hash")
              body=$(git show -s --format=%b "$hash" 2>/dev/null || true)
              author=$(git show -s --format=%an "$hash")
              short_hash=$(git show -s --format=%h "$hash")

              echo "* **$subject**" >> CHANGELOG.md

              if [ -n "$body" ]; then
                echo "$body" | while IFS= read -r line; do
                  [ -z "$line" ] && continue
                  clean_line=$(echo "$line" | sed -E 's/^[ \t]*[-*+][ \t]*//')
                  [ -n "$clean_line" ] && echo "    * $clean_line" >> CHANGELOG.md
                done
              fi
              echo "    (by @$author in $short_hash)" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            done <<< "$COMMIT_HASHES"
          fi

      - name: Upload binaries to a release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/android/*
            artifacts/windows/*
          tag_name: ${{ env.RELEASE_VERSION }}
